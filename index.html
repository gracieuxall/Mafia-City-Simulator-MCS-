<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafia City Simulator (MCS)</title>
    <style>
        /* Style spécial pour téléphones Tecno, Itel et Android */
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: #2d2d2d;
            border: 3px solid #ffcc00;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0px 0px 15px rgba(255, 204, 0, 0.4);
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            color: #ffcc00;
            font-size: 24px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 12px;
            color: #aaaaaa;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #ffcc00;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #555;
            background-color: #444;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn {
            background-color: #ffcc00;
            color: #000;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-secondary {
            background-color: transparent;
            color: #ffcc00;
            border: 2px solid #ffcc00;
        }

        .divider {
            margin: 15px 0;
            color: #888;
            font-size: 12px;
        }

        /* TON BOUTON SECRET DE DÉVELOPPEUR 🕵️‍♂️ */
        .secret-dev-zone {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px dashed #555;
        }

        .btn-secret {
            background-color: #333;
            color: #555; /* Presque invisible pour que les joueurs ne captent pas */
            border: 1px solid #444;
            padding: 5px;
            font-size: 10px;
            border-radius: 3px;
            cursor: pointer;
            width: auto;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Mafia City Simulator</h1>
        <div class="subtitle">Version 1.0 (Compatible tous Android)</div>

        <form id="authForm" onsubmit="gererConnexion(event)">
            <div class="input-group">
                <label for="username">Nom d'utilisateur :</label>
                <input type="text" id="username" placeholder="Ex: Gangster229" required>
            </div>

            <div class="input-group">
                <label for="password">Mot de passe :</label>
                <input type="password" id="password" placeholder="••••" required>
            </div>

            <button type="submit" class="btn">SE CONNECTER</button>
            
            <div class="divider">OU</div>
            
            <button type="button" class="btn btn-secondary" onclick="creerCompte()">CRÉER UN COMPTE</button>
        </form>

        <div class="secret-dev-zone">
            <button class="btn-secret" onclick="ouvrirCodeSecret()">[ Accès Admin ]</button>
        </div>
    </div>

    <script>
        // Fonctions pour faire réagir les boutons
        function gererConnexion(event) {
            event.preventDefault();
            let nom = document.getElementById('username').value;
            alert("Connexion réussie ! Bienvenue en ville, " + nom + " 🕶️");
            // Plus tard, on ajoutera le code pour ouvrir le menu principal du jeu ici
        }

        function creerCompte() {
            let nom = document.getElementById('username').value;
            if(nom === "") {
                alert("S'il te plaît, écris d'abord un Nom d'utilisateur dans la case !");
            } else {
                alert("Compte créé avec succès pour : " + nom + " ! Prépare-toi pour les missions.");
            }
        }

        // TA FONCTION SECRÈTE DE CRÉATEUR 🕵️‍♂️
        function ouvrirCodeSecret() {
            let code = prompt("Entrez le code secret du Créateur (Gracieux) :");
            if (code === "229MAFIA") { // Tu pourras changer ce code quand tu veux
                alert("Bonjour Chef ! Code Correct. Accès gratuit activé pour vous et vos proches. 👑");
            } else {
                alert("Code incorrect ! Tentative de piratage signalée.");
            }
        }
    </script>

</body>
</html>
