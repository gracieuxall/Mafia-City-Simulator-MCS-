<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mafia City Simulator (MCS)</title>
    <style>
        /* Style général adapté pour le mode horizontal sans photo */
        body {
            background: linear-gradient(135deg, #111111 0%, #222222 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* FORCE LE MODE HORIZONTAL SI LE JOUEUR EST EN VERTICAL */
        @media screen and (orientation: portrait) {
            html {
                transform: rotate(-90deg);
                transform-origin: left top;
                width: 100vh;
                height: 100vw;
                overflow: hidden;
                position: absolute;
                top: 100%;
                left: 0;
            }
        }

        /* LE CONTENEUR DU JEU (STYLE CONSOLE PORTABLE EN LARGEUR) */
        .game-container {
            position: relative;
            background-color: #1a1a1a; 
            border: 3px solid #ffcc00;
            border-radius: 10px;
            padding: 15px;
            width: 90vw;
            max-width: 640px; 
            height: 80vh;
            max-height: 320px;
            box-shadow: 0px 0px 20px rgba(255, 204, 0, 0.4);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-layout {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-grow: 1;
        }

        .game-left {
            flex: 1;
            text-align: left;
        }

        .game-right {
            flex: 1;
            background: #252525;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        h1 {
            color: #ffcc00;
            font-size: 24px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 11px;
            color: #ffcc00;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .input-group {
            margin-bottom: 8px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 3px;
            color: #ffcc00;
        }

        input {
            width: 100%;
            padding: 6px;
            border-radius: 5px;
            border: 1px solid #555;
            background-color: #333;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }

        .btn-zone {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .btn {
            background-color: #ffcc00;
            color: #000;
            border: none;
            padding: 8px;
            width: 100%;
            border-radius: 5px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-secondary {
            background-color: transparent;
            color: #ffcc00;
            border: 2px solid #ffcc00;
        }

        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
            font-size: 11px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 5px;
        }

        .privacy-link {
            color: #bbb;
            text-decoration: none;
        }

        .btn-secret {
            background-color: transparent;
            color: #333; /* Reste presque invisible pour les joueurs */
            border: none;
            cursor: pointer;
            font-size: 10px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="game-layout">
            
            <div class="game-left">
                <h1>MAFIA CITY SIMULATOR</h1>
                <div class="subtitle">COMPATIBLE ITEL & TECNO</div>
                <p style="font-size: 11px; color: #eee; margin: 0; line-height: 1.4;">
                    Deviens le boss le plus riche. Fais des missions, gagne du cash et crée ton empire avec tes alliés via MoMo !
                </p>
            </div>

            <div class="game-right">
                <form id="authForm" onsubmit="gererConnexion(event)">
                    <div class="input-group">
                        <label>Nom d'utilisateur :</label>
                        <input type="text" id="username" placeholder="Ex: Gangster229" required>
                    </div>

                    <div class="input-group">
                        <label>Mot de passe :</label>
                        <input type="password" id="password" placeholder="••••" required>
                    </div>

                    <div class="btn-zone">
                        <button type="submit" class="btn">CONNEXION</button>
                        <button type="button" class="btn btn-secondary" onclick="creerCompte()">REJOINDRE</button>
                    </div>
                </form>
            </div>

        </div>

        <div class="game-footer">
            <a href="#" class="privacy-link" onclick="afficherPrivacy()">Politique de confidentialité</a>
            <button class="btn-secret" onclick="ouvrirCodeSecret()">[ Admin ]</button>
        </div>
    </div>

    <script>
        function gererConnexion(event) {
            event.preventDefault();
            let nom = document.getElementById('username').value;
            alert("Connexion réussie ! Bienvenue en ville, " + nom + " 🕶️");
        }

        function creerCompte() {
            let nom = document.getElementById('username').value;
            if(nom === "") {
                alert("Écris un nom dans la case pour créer ton compte !");
            } else {
                alert("Compte MCS créé avec succès pour : " + nom + " !");
            }
        }

        // TON CODE SECRET ADMIN EST TOUJOURS : 229MAFIA 🕵️‍♂️
        function abrirCodeSecret() {
            // Petite correction de nom de fonction pour le bouton
        }
        
        function ouvrirCodeSecret() {
            let code = prompt("Code secret du Créateur :");
            if (code === "229MAFIA") {
                alert("Bonjour Chef ! Accès VIP Admin activé. 👑");
            } else {
                alert("Code incorrect !");
            }
        }

        function afficherPrivacy() {
            alert("Politique de confidentialité (MCS) :\n\nDonnées sécurisées localement. Vos transactions MoMo sont 100% protégées.");
        }
    </script>

</body>
  </html>
